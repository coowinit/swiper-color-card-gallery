<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>色卡联动场景图 Demo（Swiper 响应式本地版）</title>
  <link rel="stylesheet" href="./assets/css/swiper-bundle.min.css" />
  <link rel="stylesheet" href="./assets/css/style.css?v=1.0.0" />
</head>
<body>
  <main class="page">
    <div class="layout">
      <section class="gallery-shell">
        <header class="gallery-head">
          <div class="gallery-copy">
            <p class="eyebrow">Swiper 本地资源版</p>
            <h1 id="galleryTitle">Cedar / 雪松</h1>
            <p id="gallerySubtitle">默认选中第一张最新色卡。桌面端点击右侧色卡切换，手机端在下方横向滑动选择。</p>
          </div>
          <div class="summary-pill" id="metaText">4 张场景图</div>
        </header>

        <div class="stage swiper main-swiper" id="mainSwiper" aria-label="场景图轮播">
          <div class="swiper-wrapper" id="mainWrapper"></div>
          <button class="nav-btn prev" type="button" aria-label="上一张"></button>
          <button class="nav-btn next" type="button" aria-label="下一张"></button>
        </div>

        <div class="thumb-section">
          <div class="section-bar">
            <div class="thumb-label">缩略图预览</div>
            <div class="thumb-tip">左右滑动查看</div>
          </div>
          <div class="swiper thumb-swiper" id="thumbSwiper" aria-label="缩略图轮播">
            <div class="swiper-wrapper" id="thumbWrapper"></div>
          </div>
        </div>
      </section>

      <aside class="palette-shell">
        <div class="palette-head">
          <div>
            <h2>色卡列表</h2>
            <p>桌面端 Hover 显示居中颜色预览。手机端改为横向滑动，更适合手指操作。</p>
          </div>
        </div>
        <div class="swatch-swiper-wrap">
          <div class="swiper swatch-swiper" id="swatchSwiper" aria-label="色卡选择">
            <div class="swiper-wrapper" id="swatches"></div>
          </div>
        </div>
      </aside>
    </div>
  </main>

  <script defer src="./assets/js/swiper-bundle.min.js"></script>
  <script defer src="./assets/js/app.js?v=1.0.0"></script>
</body>
</html>
